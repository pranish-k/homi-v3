name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  quality:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-fund --no-audit
      - name: Build workspace libraries
        run: npm run build -w @homi/domain -w @homi/db -w @homi/ledger
      - run: npm run typecheck
      - run: npm run lint
      - name: Unit tests (money math property tests included)
        run: npm test

  integration:
    name: Integration tests + migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: homi
          POSTGRES_PASSWORD: homi
          POSTGRES_DB: homi
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U homi"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://homi:homi@localhost:5432/homi
      # exercises the Redis-backed realtime fan-out and rate limits
      # (HOMI-17, HOMI-24); without REDIS_URL the suite covers the
      # in-process fallbacks instead
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-fund --no-audit
      - name: Build workspace libraries
        run: npm run build -w @homi/domain -w @homi/db -w @homi/ledger
      - name: Migration drift check (schema and checked-in migrations must match)
        run: |
          npm run db:generate
          git diff --exit-code packages/db/migrations
      - name: Apply migrations (dry-run against ephemeral Postgres)
        run: npm run db:migrate
      - name: API integration tests (real Postgres)
        run: npm run test:integration

  build:
    # PR-only Dockerfile sanity check; on main/tags the deploy job
    # builds and pushes the image itself
    name: Build artifacts + container image
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-fund --no-audit
      - run: npm run build -w @homi/domain -w @homi/db -w @homi/ledger -w @homi/api -w @homi/worker
      - name: Docker build
        run: docker build -t homi-backend:${{ github.sha }} .

  # HOMI-14: deploy to Cloud Run.
  # main -> staging, tagged release (v*) -> prod, per spec 5.5.
  deploy-staging:
    name: Deploy staging
    needs: [quality, integration]
    if: github.ref == 'refs/heads/main' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      api_service: homi-api-staging
      worker_service: homi-worker-staging
      database_url_secret: database-url-staging
      public_origin: https://homi-api-staging-528839783533.us-east4.run.app

  deploy-prod:
    name: Deploy prod
    needs: [quality, integration]
    if: github.ref_type == 'tag' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      api_service: homi-api
      worker_service: homi-worker
      database_url_secret: database-url-prod
      public_origin: https://homi-api-528839783533.us-east4.run.app
